<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Chatbot - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2b345c 0%, #241c2c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            font-weight: bold;
        }
        
        .tab-content {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .tab-content.active {
            display: block;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
        }
        
        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        
        .message.assistant {
            background: white;
            border: 1px solid #ddd;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        input[type="text"],
        input[type="number"],
        textarea,
        select {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 8px;
            white-space: pre-wrap;
        }
        
        .document-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .document-card {
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            border: 2px solid #ddd;
        }
        
        .document-card:hover {
            border-color: #667eea;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }
        
        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Math Chatbot Demo</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('chat')">💬 Chat</button>
            <button class="tab" onclick="showTab('upload')">📄 Upload Tài liệu</button>
            <button class="tab" onclick="showTab('mindmap')">🧠 Mind Map</button>
            <button class="tab" onclick="showTab('notes')">📝 Ghi chú</button>
            <button class="tab" onclick="showTab('quiz')">✅ Quiz</button>
        </div>
        
        <!-- Chat Tab -->
        <div id="chat" class="tab-content active">
            <h2>Chat với AI</h2>
            <div class="chat-container">
                <div id="messages" class="messages"></div>
                <div class="input-group">
                    <input type="text" id="chatInput" placeholder="Hỏi về toán học..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">Gửi</button>
                </div>
            </div>
        </div>
        
        <!-- Upload Tab -->
        <div id="upload" class="tab-content">
            <h2>Upload Tài liệu</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p>📁 Click để chọn file</p>
                <p>Hỗ trợ: PDF, DOCX, TXT, JPG, PNG</p>
            </div>
            <input type="file" id="fileInput" style="display: none" accept=".pdf,.docx,.txt,.jpg,.png" onchange="uploadFile()">
            
            <div class="loading" id="uploadLoading">⏳ Đang xử lý...</div>
            <div id="uploadResult" class="result" style="display: none;"></div>
            
            <h3 style="margin-top: 30px;">Tài liệu đã upload:</h3>
            <div id="documentList" class="document-list"></div>
        </div>
        
        <!-- MindMap Tab -->
        <div id="mindmap" class="tab-content">
            <h2>Tạo Mind Map</h2>
            <div class="form-group">
                <label>Chủ đề:</label>
                <input type="text" id="mindmapTopic" placeholder="Ví dụ: Hàm số bậc hai">
            </div>
            <div class="form-group">
                <label>Độ sâu:</label>
                <input type="number" id="mindmapDepth" value="3" min="1" max="5">
            </div>
            <button onclick="createMindMap()">Tạo Mind Map</button>
            
            <div class="loading" id="mindmapLoading">⏳ Đang tạo...</div>
            <div id="mindmapResult" class="result" style="display: none;"></div>
        </div>
        
        <!-- Notes Tab -->
        <div id="notes" class="tab-content">
            <h2>Tạo Ghi chú Thông minh</h2>
            <div class="form-group">
                <label>Tiêu đề ghi chú:</label>
                <input type="text" id="noteTitle" placeholder="Ví dụ: Tổng hợp kiến thức Đạo hàm">
            </div>
            <div class="form-group">
                <label>Nội dung (tùy chọn):</label>
                <textarea id="noteContent" rows="4" placeholder="Để trống để AI tự động tạo nội dung từ tài liệu"></textarea>
            </div>
            <button onclick="createNote()">Tạo Ghi chú</button>
            
            <div class="loading" id="noteLoading">⏳ Đang tạo...</div>
            <div id="noteResult" class="result" style="display: none;"></div>
        </div>
        
        <!-- Quiz Tab -->
        <div id="quiz" class="tab-content">
            <h2>Tạo Quiz</h2>
            <div class="form-group">
                <label>Chủ đề:</label>
                <input type="text" id="quizTopic" placeholder="Ví dụ: Phương trình bậc hai">
            </div>
            <div class="form-group">
                <label>Số câu hỏi:</label>
                <input type="number" id="quizNum" value="5" min="1" max="10">
            </div>
            <div class="form-group">
                <label>Độ khó:</label>
                <select id="quizDifficulty">
                    <option value="easy">Dễ</option>
                    <option value="medium" selected>Trung bình</option>
                    <option value="hard">Khó</option>
                </select>
            </div>
            <button onclick="createQuiz()">Tạo Quiz</button>
            
            <div class="loading" id="quizLoading">⏳ Đang tạo...</div>
            <div id="quizResult" class="result" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        let currentConversationId = null;
        let uploadedDocuments = [];
        
        // Tab switching
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            
            if (tabName === 'upload') {
                loadDocuments();
            }
        }
        
        // Chat
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message
            addMessage(message, 'user');
            input.value = '';
            
            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message,
                        conversation_id: currentConversationId,
                        document_ids: uploadedDocuments.map(d => d.id)
                    })
                });
                
                const result = await response.json();
                currentConversationId = result.conversation_id;
                addMessage(result.response, 'assistant');
            } catch (error) {
                addMessage('Lỗi: ' + error.message, 'assistant');
            }
        }
        
        function addMessage(text, role) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Upload
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) return;
            
            const loading = document.getElementById('uploadLoading');
            const result = document.getElementById('uploadResult');
            
            loading.classList.add('active');
            result.style.display = 'none';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${API_URL}/api/documents/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                result.textContent = `✅ ${data.message}\nDocument ID: ${data.document_id}`;
                result.style.display = 'block';
                
                loadDocuments();
            } catch (error) {
                result.textContent = '❌ Lỗi: ' + error.message;
                result.style.display = 'block';
            } finally {
                loading.classList.remove('active');
            }
        }
        
        async function loadDocuments() {
            try {
                const response = await fetch(`${API_URL}/api/documents`);
                const data = await response.json();
                
                uploadedDocuments = data.documents;
                
                const listDiv = document.getElementById('documentList');
                listDiv.innerHTML = '';
                
                if (data.documents.length === 0) {
                    listDiv.innerHTML = '<p>Chưa có tài liệu nào</p>';
                    return;
                }
                
                data.documents.forEach(doc => {
                    const card = document.createElement('div');
                    card.className = 'document-card';
                    card.innerHTML = `
                        <strong>${doc.filename}</strong><br>
                        <small>Type: ${doc.file_type}</small><br>
                        <small>ID: ${doc.id.substring(0, 8)}...</small>
                    `;
                    listDiv.appendChild(card);
                });
            } catch (error) {
                console.error('Lỗi tải documents:', error);
            }
        }
        
        // MindMap
        async function createMindMap() {
            const topic = document.getElementById('mindmapTopic').value.trim();
            const depth = parseInt(document.getElementById('mindmapDepth').value);
            
            if (!topic) {
                alert('Vui lòng nhập chủ đề');
                return;
            }
            
            const loading = document.getElementById('mindmapLoading');
            const result = document.getElementById('mindmapResult');
            
            loading.classList.add('active');
            result.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/api/mindmap`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        topic: topic,
                        depth: depth,
                        document_ids: uploadedDocuments.map(d => d.id)
                    })
                });
                
                const data = await response.json();
                
                result.textContent = JSON.stringify(data, null, 2);
                result.style.display = 'block';
            } catch (error) {
                result.textContent = '❌ Lỗi: ' + error.message;
                result.style.display = 'block';
            } finally {
                loading.classList.remove('active');
            }
        }
        
        // Note
        async function createNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            
            if (!title) {
                alert('Vui lòng nhập tiêu đề');
                return;
            }
            
            const loading = document.getElementById('noteLoading');
            const result = document.getElementById('noteResult');
            
            loading.classList.add('active');
            result.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/api/notes`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title: title,
                        content: content || null,
                        document_ids: uploadedDocuments.map(d => d.id),
                        auto_generate: true
                    })
                });
                
                const data = await response.json();
                
                result.textContent = data.content;
                result.style.display = 'block';
            } catch (error) {
                result.textContent = '❌ Lỗi: ' + error.message;
                result.style.display = 'block';
            } finally {
                loading.classList.remove('active');
            }
        }
        
        // Quiz
        async function createQuiz() {
            const topic = document.getElementById('quizTopic').value.trim();
            const num = parseInt(document.getElementById('quizNum').value);
            const difficulty = document.getElementById('quizDifficulty').value;
            
            if (!topic) {
                alert('Vui lòng nhập chủ đề');
                return;
            }
            
            const loading = document.getElementById('quizLoading');
            const result = document.getElementById('quizResult');
            
            loading.classList.add('active');
            result.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/api/quiz`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        topic: topic,
                        num_questions: num,
                        difficulty: difficulty,
                        document_ids: uploadedDocuments.map(d => d.id)
                    })
                });
                
                const data = await response.json();
                
                let html = `<h3>Quiz: ${data.topic}</h3>`;
                data.questions.forEach((q, i) => {
                    html += `
                        <div style="margin-bottom: 20px; padding: 15px; background: white; border-radius: 8px;">
                            <strong>Câu ${i + 1}: ${q.question}</strong><br>
                            ${q.options.map(opt => `<div style="margin: 5px 0;">${opt}</div>`).join('')}
                            <div style="margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 4px;">
                                <strong>Đáp án đúng:</strong> ${q.options[q.correct_answer]}<br>
                                <strong>Giải thích:</strong> ${q.explanation}
                            </div>
                        </div>
                    `;
                });
                
                result.innerHTML = html;
                result.style.display = 'block';
            } catch (error) {
                result.textContent = '❌ Lỗi: ' + error.message;
                result.style.display = 'block';
            } finally {
                loading.classList.remove('active');
            }
        }
        
        // Load documents on page load
        loadDocuments();
    </script>
</body>
</html>
